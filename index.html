function App(){
  const [url,setUrl]=useState(null);
  const [txs,setTxs]=useState([]);
  const [syncing,setSyncing]=useState(false);
  const [msg,setMsg]=useState("");
  const [tab,setTab]=useState("panoramica");
  const [excInvest,setExcInvest]=useState(true);
  const [selYears,setSelYears]=useState([]); // [] = tutti gli anni
  const [selMonths,setSelMonths]=useState([]); // [] = tutti i mesi
  const selYear=selYears.length===1?selYears[0]:null;
  const selMonth=selMonths.length===1?selMonths[0]:null;
  const [setup,setSetup]=useState(false);
  const [ready,setReady]=useState(false);
  const [rulesRev,setRulesRev]=useState(0);
  const [modal,setModal]=useState(null);
  const [balanceSaldos,setBalanceSaldos]=useState(()=>{
    try{const d=localStorage.getItem("balanceSaldos");return d?JSON.parse(d):{};}catch{return{};}
  }); // saldi iniziali/finali dai CSV — persistiti in localStorage // {title,message,danger,onConfirm,pendingFiles,handler}
  const pendingFilesRef=React.useRef(null); // bumped when rules change to trigger re-parse

  useEffect(()=>{
    const saved=localStorage.getItem("gsUrl");
    const local=lsGet();
    if(local.length>0)setTxs(local);
    if(saved){
      setUrl(saved);
      // Legge SEMPRE le impostazioni da Sheets all'avvio — protezione perdita dati
      settingsPull(saved).then(synced=>{
        if(synced) console.log("✅ Regole sincronizzate da Sheets:", rulesGet().length);
        syncFrom(saved,local.length);
      });
    }
    else setSetup(true);
    setReady(true);
  },[]);

  async function syncFrom(u,localCount){
    setSyncing(true);setMsg("🔄 Sincronizzo con Google Sheets...");
    try{const rows=await gsRead(u);if(rows.length>=localCount){setTxs(rows);lsSave(rows);}setMsg("");}
    catch{setMsg(localCount>0?"⚠️ Sheets offline — uso dati locali.":"❌ Connessione fallita.");setTimeout(()=>setMsg(""),5000);}
    setSyncing(false);
  }
  function handleSaveUrl(u){localStorage.setItem("gsUrl",u);setUrl(u);setSetup(false);syncFrom(u,0);}

  // Analizza file CSV selezionati e ritorna le righe parsate
  async function parseFiles(files){
    let rows=[];
    const balanceMap={};
    for(const f of files){const txt=await f.text();rows.push(...parseCSV(txt,balanceMap));}
    return {rows, balanceMap};
  }

  // Modalità 1: Aggiungi — salta i duplicati (comportamento normale)
  async function handleUpload(files){
    if(Array.isArray(files)&&files.length===0)return;
    files=Array.isArray(files)?files:Array.from(files.target?.files||[]);
    if(!files.length)return;
    setMsg(`⏳ Leggo ${files.length} file...`);
    const {rows:newRows, balanceMap:newBal}=await parseFiles(files);
    const existKeys=new Set(txs.map(t=>`${t.date}|${t.uscita}|${t.entrata}|${t.causale}`));
    const toAdd=newRows.filter(t=>!existKeys.has(`${t.date}|${t.uscita}|${t.entrata}|${t.causale}`));
    setMsg(`📊 Trovate ${newRows.length} transazioni · ${toAdd.length} nuove · ${newRows.length-toAdd.length} già presenti`);
    await new Promise(r=>setTimeout(r,1500));
    if(!toAdd.length){setMsg("ℹ️ Nessuna transazione nuova (duplicati già presenti).");setTimeout(()=>setMsg(""),4000);return;}
    const merged=[...txs,...toAdd].sort((a,b)=>a.date.localeCompare(b.date));
    setTxs(merged);lsSave(merged);
    setMsg(`✅ ${toAdd.length} nuove transazioni! Sync Sheets...`);
    setSyncing(true);
    try{
      await gsWrite(url,toAdd,(done,tot,rows)=>setMsg(`☁️ Google Sheets: ${done}/${tot} blocchi · ${Math.round(done/tot*100)}%`));
      setMsg(`✅ ${toAdd.length} aggiunte · ${merged.length} totali.`);
    }catch{setMsg("⚠️ Visibili ma non sincronizzati con Sheets.");}
    setSyncing(false);setTimeout(()=>setMsg(""),6000);try{document.getElementById("inp-full").value="";}catch{}
  }

  // Modalità 2: Sostituisci periodo — rimuove i dati nel range del file e reinserisce
  async function handleReplaceByPeriod(files){
    if(Array.isArray(files)&&files.length===0)return;
    files=Array.isArray(files)?files:Array.from(files.target?.files||[]);
    if(!files.length)return;
    setMsg(`⏳ Analizzo ${files.length} file...`);
    const {rows:newRows, balanceMap:newBal}=await parseFiles(files);
    if(!newRows.length){setMsg("❌ Nessuna riga valida nei file.");setTimeout(()=>setMsg(""),3000);return;}
    // Calcola il range di date coperto dai nuovi file
    const newDates=newRows.map(r=>r.date).sort();
    const minDate=newDates[0], maxDate=newDates[newDates.length-1];
    const removed=txs.filter(t=>t.date>=minDate&&t.date<=maxDate).length;
    if(!window.confirm(`Sostituirò le ${removed} transazioni esistenti nel periodo ${minDate} → ${maxDate} con i dati dei ${files.length} file selezionati (${newRows.length} righe).\n\nContinuare?`)){e.target.value="";return;}
    // Rimuove il periodo e reinserisce
    const outside=txs.filter(t=>t.date<minDate||t.date>maxDate);
    const merged=[...outside,...newRows].sort((a,b)=>a.date.localeCompare(b.date));
    setTxs(merged);lsSave(merged);
    setMsg(`🔄 ${removed} record sostituiti. Riscrivo Sheets...`);
    setSyncing(true);
    try{
      await gsClear(url);
      await gsWrite(url,merged,(done,tot)=>setMsg(`☁️ Google Sheets: ${done}/${tot} blocchi · ${Math.round(done/tot*100)}%`));
      setMsg(`✅ Periodo sostituito · ${merged.length} transazioni totali.`);
    }catch{setMsg("⚠️ Aggiornato in locale. Sheets non raggiungibile.");}
    setSyncing(false);setTimeout(()=>setMsg(""),6000);try{document.getElementById("inp-full").value="";}catch{}
  }

  // Modalità 3: Reimporta tutto — cancella tutto e ricarica da zero
  async function handleFullReimport(files){
    if(Array.isArray(files)&&files.length===0)return;
    files=Array.isArray(files)?files:Array.from(files.target?.files||[]);
    if(!files.length)return;
    setSyncing(true);
    setMsg("🗑️ Cancello dati esistenti...");
    lsSave([]);setTxs([]);
    try{await gsClear(url);}catch{}
    setMsg(`⏳ Leggo ${files.length} file CSV...`);
    const {rows:newRows, balanceMap:newBal}=await parseFiles(files);
    const sorted=newRows.sort((a,b)=>a.date.localeCompare(b.date));
    setMsg(`✅ ${sorted.length} transazioni importate · Sincronizzazione Google Sheets in corso — non chiudere la pagina...`);
    setTxs(sorted);lsSave(sorted);
    // Check localStorage size
    const sz=lsSize();
    if(sz>LS_WARN)setMsg(`⚠️ Attenzione: localStorage al ${Math.round(sz/1024/1024*10)/10}MB su ~5MB. Considera di svuotare la cache.`);
    try{
      await gsWrite(url,sorted,(done,tot)=>setMsg(`☁️ Sheets: ${done}/${tot} blocchi (${Math.round(done/tot*100)}%) — non chiudere la pagina`));
      setMsg(`✅ Reimport completo · ${sorted.length} transazioni · Sheets aggiornato.`);
    setTimeout(()=>setMsg(""),8000);
    }catch{setMsg(`✅ ${sorted.length} transazioni importate (solo locale — Sheets non aggiornato).`);}
    setSyncing(false);setTimeout(()=>setMsg(""),6000);try{document.getElementById("inp-full").value="";}catch{}
  }

  const years=useMemo(()=>[...new Set(txs.map(t=>t.year))].sort(),[txs]);

  function toggleYear(y,ctrlKey,shiftKey){
    if(!y){setSelYears([]);setSelMonths([]);return;}
    if(shiftKey&&selYears.length>0){
      // SHIFT: seleziona range da ultimo selezionato a y
      const last=selYears[selYears.length-1];
      const allYears=[...new Set(txs.map(t=>t.year))].sort();
      const i1=allYears.indexOf(Math.min(last,y));
      const i2=allYears.indexOf(Math.max(last,y));
      setSelYears(allYears.slice(i1,i2+1));
    } else if(!ctrlKey){setSelYears([y]);setSelMonths([]);}
    else{setSelYears(prev=>prev.includes(y)?prev.filter(x=>x!==y):[...prev,y].sort());}
  }
  function toggleMonth(m,ctrlKey,shiftKey){
    if(shiftKey&&selMonths.length>0){
      // SHIFT: seleziona range da ultimo selezionato a m
      const last=selMonths[selMonths.length-1];
      const range=Array.from({length:Math.abs(m-last)+1},(_,i)=>Math.min(m,last)+i);
      setSelMonths(prev=>[...new Set([...prev,...range])].sort((a,b)=>a-b));
    } else if(!ctrlKey){setSelMonths([m]);}
    else{setSelMonths(prev=>prev.includes(m)?prev.filter(x=>x!==m):[...prev,m].sort());}
  }
  const filteredTxs=useMemo(()=>{
    let r=txs;
    if(selYears.length>0)r=r.filter(t=>selYears.includes(t.year));
    if(selMonths.length>0)r=r.filter(t=>selMonths.includes(t.month));
    return r;
  },[txs,selYears,selMonths]);
  const agg=useMemo(()=>aggregate(filteredTxs,excInvest),[filteredTxs,excInvest]);
  const pnl=useMemo(()=>investPnL(filteredTxs),[filteredTxs]);

  const periodLabel=selYears.length===0?"Tutti gli anni":
    selYears.length===1?(selMonths.length===1?`${MONTHS_IT[selMonths[0]-1]} ${selYears[0]}`:
    selMonths.length>1?`${selYears[0]} (${selMonths.length} mesi)`:String(selYears[0])):
    `${selYears.length} anni selezionati`;

  if(!ready)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:C.muted}}>Avvio...</div>;
  if(setup)return<Setup onSave={handleSaveUrl}/>;


  const TABS=[["panoramica","📊 Panoramica"],["mensile","📅 Mensile"],["categorie","🏷 Categorie"],["venditori","🏪 Venditori"],["entrate","💰 Entrate"],["metodi","💳 Metodi"],["investimenti","📈 Investimenti"],["revisione","🔍 Revisione"],["regole","🔧 Regole"]];

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:C.bg}}>
      {/* LEFT SIDEBAR - desktop */}
      <div className="sidebar-desktop" style={{flexShrink:0}}>
        <Sidebar years={years} selYears={selYears} selMonths={selMonths} toggleYear={toggleYear} toggleMonth={toggleMonth}/>
      </div>

      {/* MAIN AREA */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* TOP HEADER */}
        <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"10px 16px",flexShrink:0,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:120}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <div style={{fontSize:16,fontWeight:800}}>💳 Conto Corrente</div>
                {txs.length>0&&<div style={{fontSize:13,fontWeight:700,color:"#60a5fa",borderLeft:"2px solid #60a5fa",paddingLeft:8}}>{TABS.find(([id])=>id===tab)?.[1]||""}</div>}
              </div>
              <div style={{color:C.muted,fontSize:10}}>{txs.length.toLocaleString()} transazioni · <strong style={{color:"#60a5fa"}}>{periodLabel}</strong><span style={{marginLeft:8,background:"#f0fdf4",color:"#16a34a",borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700,letterSpacing:0.5}}>{VERSION}</span></div>
            </div>
            <button disabled={syncing} onClick={()=>setModal({
                title:"📂 Aggiungi transazioni",
                message:"Usa questa funzione per aggiungere nuovi record da una nuova estrazione della tua banca.\n\nI dati verranno accodati al database esistente.\n\nAttenzione: se carichi un file già importato in precedenza, le transazioni risulteranno duplicate.",
                danger:false, inputId:"inp-add"
              })} style={{background:"#60a5fa",color:"#fff",borderRadius:8,padding:"7px 12px",cursor:syncing?"not-allowed":"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4,opacity:syncing?0.6:1,border:"none"}}>
              📂 Aggiungi
            </button>
            <button disabled={syncing} onClick={()=>setModal({
                title:"🔁 Sostituisci periodo",
                message:"Usa questa funzione per ricaricare un\'estrazione che avevi già importato.\n\nLe transazioni con lo stesso intervallo di date verranno eliminate e sostituite con quelle del nuovo file.\n\nLe transazioni di altri periodi non vengono toccate.",
                danger:false, inputId:"inp-rep"
              })} style={{background:"#fef3c7",color:"#b45309",border:"1px solid #fcd34d",borderRadius:8,padding:"7px 12px",cursor:syncing?"not-allowed":"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4,opacity:syncing?0.6:1}}>
              🔁 Sostituisci
            </button>
            <button disabled={syncing} onClick={()=>setModal({
                title:"♻️ Reimport completo",
                message:`⚠️ Operazione irreversibile.\n\nL'intero database verrà azzerato e sostituito dai file che selezionerai.\nTutte le ${txs.length} transazioni attuali andranno perse.\n\nLe tue regole di categorizzazione e le categorie personalizzate rimarranno intatte.`,
                danger:true, inputId:"inp-full"
              })} style={{background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:8,padding:"7px 12px",cursor:syncing?"not-allowed":"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4,opacity:syncing?0.6:1}}>
              ♻️ Tutto
            </button>
            {/* Hidden file inputs */}
            <input id="inp-add" type="file" accept=".csv" multiple style={{display:"none"}} onChange={e=>{const fs=Array.from(e.target.files);if(fs.length)handleUpload(fs);e.target.value="";}}/>
            <input id="inp-rep" type="file" accept=".csv" multiple style={{display:"none"}} onChange={e=>{const fs=Array.from(e.target.files);if(fs.length)handleReplaceByPeriod(fs);e.target.value="";}}/>
            <input id="inp-full" type="file" accept=".csv" multiple style={{display:"none"}} onChange={e=>{const fs=Array.from(e.target.files);if(fs.length)handleFullReimport(fs);e.target.value="";}}/>
            <button onClick={()=>syncFrom(url,txs.length)} disabled={syncing} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 11px",cursor:"pointer",fontSize:15}} title="Ricarica da Sheets">🔄</button>
            <button onClick={()=>setSetup(true)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 11px",cursor:"pointer",fontSize:15}} title="Impostazioni">⚙️</button>
          </div>
        </div>

        {/* STATUS */}
        {msg&&<div style={{
          background:msg.includes("non chiudere")?"#fef3c7":msg.includes("✅")?"#f0fdf4":msg.includes("⚠️")?"#fff7ed":"#eff6ff",
          borderBottom:`1px solid ${msg.includes("non chiudere")?"#fde68a":msg.includes("✅")?"#86efac":msg.includes("⚠️")?"#fed7aa":"#bfdbfe"}`,
          padding:"8px 16px",fontSize:12,
          color:msg.includes("non chiudere")?"#92400e":msg.includes("✅")?"#166534":msg.includes("⚠️")?"#9a3412":"#3b82f6",
          textAlign:"center",flexShrink:0,fontWeight:msg.includes("non chiudere")?700:400
        }}>{msg}</div>}

        {/* MOBILE YEAR/MONTH FILTER */}
        <div className="sidebar-mobile" style={{background:C.sidebar,borderBottom:`1px solid ${C.border}`,padding:"8px 12px",gap:6,overflowX:"auto",flexShrink:0,alignItems:"center"}}>
          <span style={{fontSize:10,color:C.faint,fontWeight:700,whiteSpace:"nowrap"}}>ANNO:</span>
          {[null,...years].map(y=>(
            <button key={y||"all"} onClick={e=>{if(!y){toggleYear(null,false,false);}else{toggleYear(y,e.ctrlKey||e.metaKey,e.shiftKey);}}} style={{
              background:(y&&selYears.includes(y))||(!y&&selYears.length===0)?"#60a5fa":"transparent",
              color:((y&&selYears.includes(y))||(!y&&selYears.length===0))?"#fff":C.muted,
              border:`1px solid ${((y&&selYears.includes(y))||(!y&&selYears.length===0))?"#60a5fa":C.border}`,
              borderRadius:5,padding:"4px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"
            }}>{y||"Tutti"}</button>
          ))}
          {selYears.length>0&&<>
            <span style={{fontSize:10,color:C.faint,fontWeight:700,whiteSpace:"nowrap",marginLeft:4}}>MESE:</span>
            {MONTHS_IT.map((m,i)=>(
              <button key={i} onClick={e=>toggleMonth(i+1,e.ctrlKey||e.metaKey,e.shiftKey)} style={{
                background:selMonths.includes(i+1)?"#60a5fa":"transparent",
                color:selMonths.includes(i+1)?"#fff":C.muted,
                border:`1px solid ${selMonths.includes(i+1)?"#60a5fa":C.border}`,
                borderRadius:5,padding:"4px 8px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"
              }}>{m}</button>
            ))}
          </>}
        </div>

        {/* SCROLLABLE CONTENT */}
        <div style={{flex:1,overflow:"auto",padding:"16px"}}>

          {/* EMPTY */}
          {txs.length===0&&!syncing&&(
            <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
              <div style={{fontSize:52,marginBottom:12}}>📂</div>
              <h2 style={{color:C.text,marginBottom:8}}>Nessun dato</h2>
              <p style={{fontSize:14}}>Clicca <strong>📂 Aggiungi</strong> per aggiungere file CSV · <strong>♻️ Tutto</strong> per importare tutto da zero.</p>
            </div>
          )}

          {txs.length>0&&(<>
            {/* INVEST BANNER */}
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"8px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",fontSize:12}}>
              <span style={{color:"#92400e",flex:1,lineHeight:1.5}}>
                📈 <strong>{pnl.count}</strong> op. investimento — versato: <strong>{fmt(pnl.totalOut)}</strong> · rientrato: <strong>{fmt(pnl.totalIn)}</strong> · delta flusso: <strong style={{color:(pnl.totalIn-pnl.totalOut)>=0?"#10b981":"#ef4444"}}>{fmt(pnl.totalIn-pnl.totalOut)}</strong>
                <span style={{fontSize:10,color:"#b45309",marginLeft:6}}>(flusso di cassa, non plusvalenza reale)</span>
              </span>
              <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontWeight:600,color:"#92400e",whiteSpace:"nowrap",fontSize:11}}>
                <input type="checkbox" checked={excInvest} onChange={e=>setExcInvest(e.target.checked)}/> Escludi dai totali
              </label>
            </div>

            {/* KPIs */}
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
              <Card label="Entrate" value={"+"+fmt(agg.totalE)} sub={excInvest?"senza investimenti":periodLabel} color="#bbf7d0" icon="↑"/>
              <Card label="Uscite"  value={"-"+fmt(agg.totalU)} sub={excInvest?"senza investimenti":periodLabel} color="#fecaca" icon="↓"/>
              <Card label="Saldo"   value={((agg.totalE-agg.totalU)>=0?"+":"-")+fmt(Math.abs(agg.totalE-agg.totalU))} sub={(agg.totalE-agg.totalU)>=0?"positivo":"negativo"} color={(agg.totalE-agg.totalU)>=0?"#bbf7d0":"#fecaca"} icon="≈"/>
              <Card label="Transaz." value={filteredTxs.length.toLocaleString()} sub={periodLabel} color="#ddd6fe" icon="#"/>
              {(()=>{
                if(!balanceSaldos||!Object.keys(balanceSaldos).length)return null;
                const entries=Object.entries(balanceSaldos).sort((a,b)=>b[0].localeCompare(a[0]));
                const [lastDate,lastSaldo]=entries[0];
                // Aggiungi movimenti successivi all'ultimo saldo certificato
                const delta=txs.filter(t=>t.date>lastDate).reduce((s,t)=>s+t.entrata-t.uscita,0);
                const stimato=lastSaldo.valore+delta;
                return <Card label="Saldo Conto" value={fmt(stimato)} sub={`stimato da ${lastDate}`} color={stimato>=0?"#bfdbfe":"#fecaca"} icon="🏦"/>;
              })()}
            </div>

            {/* TABS */}
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              {TABS.map(([id,label])=>{
                const reviewCount=id==="revisione"?filteredTxs.filter(t=>needsReview(t)).length:0;
                return(
                  <button key={id} onClick={()=>setTab(id)} style={{
                    background:tab===id?"#60a5fa":"transparent",
                    color:tab===id?"#fff":C.muted,
                    border:`1px solid ${tab===id?"#60a5fa":C.border}`,
                    borderRadius:6,padding:"6px 14px",fontSize:12,
                    fontWeight:tab===id?600:400,cursor:"pointer",
                    position:"relative"
                  }}>
                    {label}
                    {reviewCount>0&&<span style={{
                      position:"absolute",top:-6,right:-6,
                      background:"#ef4444",color:"#fff",
                      borderRadius:"50%",width:18,height:18,
                      fontSize:10,fontWeight:700,display:"flex",
                      alignItems:"center",justifyContent:"center",
                      lineHeight:1
                    }}>{reviewCount>99?"99+":reviewCount}</span>}
                  </button>
                );
              })}
            </div>


            {tab==="panoramica"&&<PanoramicaTab allTxs={txs} filteredTxs={filteredTxs} selYears={selYears} selYear={selYear} selMonth={selMonth} excInvest={excInvest} balanceSaldos={balanceSaldos}/>}
            {tab==="mensile"&&<MensileTab txs={filteredTxs} excInvest={excInvest}/>}
            {tab==="categorie"&&<CategorieTab txs={filteredTxs} excInvest={excInvest} selYear={selYear} selMonth={selMonth} selYears={selYears} selMonths={selMonths} onRuleAdded={()=>{
              const rules=rulesGet();
              const local=lsGet();
              if(local.length>0){
                const updated=local.map(t=>{
                  const cl=extractAndClassify(t.causale,t.descrizione,rules);
                  return{...t,vendor:cl.vendor,categoria:applyAlias(cl.categoria)};
                });
                lsSave(updated);setTxs(updated);
              }
              if(url)settingsPush(url).then(()=>console.log("✅ Regole Sheets:",rulesGet().length));
            }}/>}
            {tab==="venditori"&&<VenditoriTab allTxs={txs} filteredTxs={filteredTxs} selYear={selYear} selMonth={selMonth} selYears={selYears} selMonths={selMonths}/>}
            {tab==="entrate"&&<EntrateTab txs={filteredTxs} allTxs={txs} selYear={selYear} selMonth={selMonth}/>}
            {tab==="metodi"&&<MetodiTab txs={filteredTxs} selYear={selYear} selMonth={selMonth}/>}
            {tab==="investimenti"&&<InvestimentiTab txs={filteredTxs} balanceSaldos={balanceSaldos}/>}
            {tab==="revisione"&&<RevisioneTab txs={filteredTxs} onRuleAdded={(skipReapply)=>{
              const rules=rulesGet();
              const local=lsGet();
              if(local.length>0){
                const updated=local.map(t=>{
                  if(t._manualCat)return t; // mai sovrascrivere modifiche manuali
                  if(skipReapply)return t;  // no re-apply ma aggiorna stato
                  const cl=extractAndClassify(t.causale,t.descrizione,rules);
                  return{...t,vendor:cl.vendor,categoria:applyAlias(cl.categoria)};
                });
                lsSave(updated);setTxs([...updated]); // forza re-render
              }
              if(!skipReapply&&url)settingsPush(url);
            }}/>}
            {tab==="regole"&&<RulesTab gsUrl={url} txs={txs} onRulesChange={()=>{
              const rules=rulesGet();
              const local=lsGet();
              if(local.length>0){
                const updated=local.map(t=>{
                  const cl=extractAndClassify(t.causale,t.descrizione,rules);
                  return{...t,vendor:cl.vendor,categoria:applyAlias(cl.categoria)};
                });
                lsSave(updated);
                setTxs(updated);
              }
              setRulesRev(v=>v+1);
              if(url){
                settingsPush(url).then(()=>console.log("✅ Regole salvate su Sheets:",rulesGet().length));
              }
            }}/>}
          </>)}
      {modal&&<ConfirmModal
        title={modal.title}
        message={modal.message}
        danger={modal.danger}
        onConfirm={()=>{const id=modal.inputId;setModal(null);setTimeout(()=>{try{document.getElementById(id).click();}catch{}},50);}}
        onCancel={()=>setModal(null)}
      />}
        </div>
      </div>
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
